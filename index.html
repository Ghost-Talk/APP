<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GhostTalk 👻</title>
  <style>
    /* Moderní temný design */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at center, #1e293b, #0f172a);
      color: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    .chat-card {
      width: 95%;
      max-width: 450px;
      height: 85vh;
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(12px); /* Glassmorphism efekt */
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .header {
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    h2 {
      margin: 0;
      font-size: 1.5rem;
      background: linear-gradient(90deg, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #loginBtn {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      margin: 10px auto;
      display: block;
      transition: all 0.3s ease;
    }

    #loginBtn:hover {
      background: #6366f1;
      transform: translateY(-2px);
    }

    /* Oblast zpráv */
    #chat {
      flex-grow: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    /* Styl bublin */
    .msg {
      max-width: 80%;
      padding: 10px 16px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.4;
      position: relative;
      animation: popIn 0.3s ease-out;
    }

    .msg.other {
      background: #334155;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .msg.me {
      background: #4f46e5;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .msg b {
      display: block;
      font-size: 0.75rem;
      opacity: 0.8;
      margin-bottom: 4px;
    }

    /* Vstupní pole */
    .input-area {
      padding: 20px;
      display: flex;
      gap: 10px;
      background: rgba(15, 23, 42, 0.5);
      border-bottom-left-radius: 24px;
      border-bottom-right-radius: 24px;
    }

    input {
      flex-grow: 1;
      background: #1e293b;
      border: 1px solid #475569;
      color: white;
      padding: 12px 18px;
      border-radius: 14px;
      outline: none;
      transition: border 0.3s;
    }

    input:focus {
      border-color: #818cf8;
    }

    .send-btn {
      background: #10b981;
      border: none;
      color: white;
      width: 48px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 1.2rem;
      transition: 0.3s;
    }

    .send-btn:hover {
      background: #059669;
      transform: scale(1.05);
    }

    /* Scrollbar */
    #chat::-webkit-scrollbar { width: 5px; }
    #chat::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

<div class="chat-card">
  <div class="header">
    <h2>👻 GhostTalk</h2>
    <button id="loginBtn" onclick="login()">Přihlásit se Googlem</button>
  </div>

  <div id="chat">
    </div>

  <div class="input-area">
    <input id="messageInput" placeholder="Napiš zprávu..." autocomplete="off">
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // Konfigurace (Použij svoje údaje)
  const firebaseConfig = {
    apiKey: "AIzaSyB8olAwCB08KQ31UVXBt23sbrTwZlpsmg8",
    authDomain: "ghosttalk1.firebaseapp.com",
    projectId: "ghosttalk1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  let currentUser = null;

  // Sledování stavu přihlášení
  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUser = user;
      document.getElementById("loginBtn").innerText = `Jsi jako ${user.displayName}`;
      document.getElementById("loginBtn").style.background = "#334155";
    }
  });

  // Zpracování výsledku přesměrování (řeší chybu na mobilech)
  getRedirectResult(auth).catch(err => console.error("Chyba redirectu:", err));

  async function login() {
    await signInWithRedirect(auth, provider);
  }

  async function sendMessage() {
    const input = document.getElementById("messageInput");
    const text = input.value.trim();

    if (!currentUser) return alert("Nejdřív se přihlas!");
    if (!text) return;

    await addDoc(collection(db, "messages"), {
      text: text,
      name: currentUser.displayName,
      uid: currentUser.uid,
      timestamp: Date.now()
    });

    input.value = "";
  }

  // Real-time načítání zpráv
  const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
  onSnapshot(q, (snapshot) => {
    const chat = document.getElementById("chat");
    chat.innerHTML = "";

    snapshot.forEach(doc => {
      const msg = doc.data();
      const isMe = currentUser && msg.uid === currentUser.uid;
      
      const div = document.createElement("div");
      div.className = `msg ${isMe ? 'me' : 'other'}`;
      div.innerHTML = `<b>${msg.name}</b>${msg.text}`;
      chat.appendChild(div);
    });

    chat.scrollTop = chat.scrollHeight;
  });

  // Eventy pro tlačítka
  window.login = login;
  window.sendMessage = sendMessage;
  document.getElementById("messageInput").addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendMessage();
  });
</script>

</body>
</html>
