<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GhostTalk 👻</title>
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --text: #f8fafc;
    }

    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(circle at top, #1e293b, #0f172a);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .chat-container {
      width: 95%;
      max-width: 450px;
      height: 90vh;
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 28px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .header {
      padding: 20px;
      text-align: center;
      background: rgba(15, 23, 42, 0.4);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    h2 {
      margin: 0 0 10px 0;
      font-size: 1.6rem;
      letter-spacing: 1px;
      background: linear-gradient(to right, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #loginBtn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    #loginBtn:active { transform: scale(0.95); }

    #chat {
      flex-grow: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Bubliny */
    .msg {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 20px;
      font-size: 0.95rem;
      position: relative;
      animation: fadeIn 0.3s ease;
      word-wrap: break-word;
    }

    .msg b {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      margin-bottom: 4px;
      opacity: 0.7;
    }

    .me {
      align-self: flex-end;
      background: var(--primary);
      border-bottom-right-radius: 4px;
    }

    .other {
      align-self: flex-start;
      background: #334155;
      border-bottom-left-radius: 4px;
    }

    /* Vstup */
    .input-box {
      padding: 20px;
      display: flex;
      gap: 10px;
      background: rgba(15, 23, 42, 0.6);
    }

    input {
      flex-grow: 1;
      background: #1e293b;
      border: 1px solid #475569;
      color: white;
      padding: 14px;
      border-radius: 16px;
      outline: none;
    }

    .send-btn {
      background: #10b981;
      border: none;
      color: white;
      width: 50px;
      border-radius: 16px;
      cursor: pointer;
      font-size: 1.2rem;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="header">
    <h2>👻 GhostTalk</h2>
    <button id="loginBtn" onclick="login()">Přihlásit se přes Google</button>
  </div>

  <div id="chat"></div>

  <div class="input-box">
    <input id="messageInput" placeholder="Napiš zprávu..." autocomplete="off">
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB8olAwCB08KQ31UVXBt23sbrTwZlpsmg8",
    authDomain: "ghosttalk1.firebaseapp.com",
    projectId: "ghosttalk1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  let currentUser = null;

  // Kontrola po návratu z Google přihlášení
  getRedirectResult(auth).then((result) => {
    if (result?.user) {
      currentUser = result.user;
      updateUI(currentUser);
    }
  }).catch(err => console.error("Auth error:", err));

  // Sledování uživatele (trvalé přihlášení)
  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUser = user;
      updateUI(user);
    }
  });

  function updateUI(user) {
    const btn = document.getElementById("loginBtn");
    btn.innerText = `Jsi jako ${user.displayName.split(' ')[0]}`;
    btn.style.background = "rgba(255,255,255,0.1)";
  }

  async function login() {
    await signInWithRedirect(auth, provider);
  }

  async function sendMessage() {
    const input = document.getElementById("messageInput");
    const text = input.value.trim();

    if (!currentUser) return alert("Musíš se přihlásit!");
    if (!text) return;

    await addDoc(collection(db, "messages"), {
      text: text,
      name: currentUser.displayName,
      uid: currentUser.uid,
      time: Date.now()
    });
    input.value = "";
  }

  // Načítání zpráv
  const q = query(collection(db, "messages"), orderBy("time", "asc"));
  onSnapshot(q, (snap) => {
    const chat = document.getElementById("chat");
    chat.innerHTML = "";
    snap.forEach(doc => {
      const m = doc.data();
      const isMe = currentUser && m.uid === currentUser.uid;
      chat.innerHTML += `
        <div class="msg ${isMe ? 'me' : 'other'}">
          <b>${m.name}</b>
          ${m.text}
        </div>`;
    });
    chat.scrollTop = chat.scrollHeight;
  });

  window.login = login;
  window.sendMessage = sendMessage;
  document.getElementById("messageInput").addEventListener("keypress", e => e.key === "Enter" && sendMessage());
</script>

</body>
</html>
